<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiGAP BIMA</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f3f4f6; text-align: center; }
        #loading { font-size: 1.2rem; font-weight: bold; color: #374151; }
        #error-message { display: none; background: #fee2e2; border: 1px solid #ef4444; padding: 20px; border-radius: 8px; max-width: 400px; }
        #error-message h2 { color: #b91c1c; margin-top: 0; }
        #error-message p { color: #7f1d1d; }
        #error-detail { font-family: monospace; background: #fff; padding: 10px; border-radius: 4px; color: #dc2626; margin-top: 10px; font-size: 0.9rem; word-wrap: break-word; }
        button { background-color: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #dc2626; }
    </style>
</head>
<body>

    <div id="loading">Memulai pengecekan...</div>
    
    <div id="error-message">
        <h2>Akses Ditolak!</h2>
        <p>Aplikasi mewajibkan akses Kamera dan GPS.</p>
        <div id="error-detail"></div>
        <button onclick="location.reload()">Muat Ulang Halaman</button>
    </div>

    <div id="app-container"></div>

    <script>
        async function checkPermissionsAndLoadApp() {
            try {
                // 1. Cek Kamera
                document.getElementById('loading').innerText = "Meminta Izin Kamera...";
                const cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                cameraStream.getTracks().forEach(track => track.stop());

                // 2. Cek GPS
                document.getElementById('loading').innerText = "Meminta Izin GPS...";
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        loadIframe();
                    },
                    (error) => {
                        let errorTeks = "GPS Gagal: ";
                        if(error.code === 1) errorTeks += "Akses ditolak pengguna.";
                        else if(error.code === 2) errorTeks += "Posisi tidak tersedia (GPS mati).";
                        else if(error.code === 3) errorTeks += "Waktu habis (Timeout).";
                        else errorTeks += error.message;
                        
                        showError(errorTeks);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } catch (err) {
                showError("Kamera Gagal: " + err.message + " (Apakah ini HTTPS?)");
            }
        }

        function loadIframe() {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('app-container');
            container.innerHTML = `
                <iframe 
                    allow="camera *; geolocation *; microphone *" 
                    src="https://script.google.com/macros/s/AKfycbw65tJCc7008Xn3uu5K0zXmGrZ1z7oq_xtm_Kq919PGnU0cvlItNQ-e-mG2NZRecpp7-g/exec" 
                    style="position:fixed; top:0; left:0; bottom:0; right:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;"
                >Your browser doesn't support iframes</iframe>
            `;
        }

        function showError(detailTeks) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-message').style.display = 'block';
            document.getElementById('error-detail').innerText = detailTeks;
        }

        window.onload = checkPermissionsAndLoadApp;
    </script>
</body>
</html>
